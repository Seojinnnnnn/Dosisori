<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도시의 목소리 — 손글씨 안내문 아카이브</title>
<style>
  :root {
    --bg: #f5f4f0;
    --fg: #1a1a1a;
    --muted: #888;
    --border: #ddd;

    --분노: #c0392b;
    --호소: #2980b9;
    --유머: #f39c12;
    --명령: #2c3e50;
    --경고: #e67e22;
    --위협: #8e44ad;
    --친근: #27ae60;
    --냉소: #7f8c8d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    font-size: 14px;
    line-height: 1.6;
  }

  /* HEADER */
  header {
    padding: 60px 40px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 40px;
  }

  .header-left h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 8px;
  }

  .header-left p {
    color: var(--muted);
    font-size: 13px;
    max-width: 420px;
    word-break: keep-all;
  }

  .header-right {
    font-size: 12px;
    color: var(--muted);
    text-align: right;
    flex-shrink: 0;
  }

  .header-right span {
    display: block;
    font-size: 28px;
    font-weight: 700;
    color: var(--fg);
    line-height: 1;
    margin-bottom: 4px;
  }

  /* CONTROLS */
  .controls {
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 4px;
  }

  .tag-btn {
    padding: 5px 12px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: white;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    color: var(--muted);
    transition: all 0.15s;
  }

  .tag-btn:hover { border-color: var(--fg); color: var(--fg); }

  .tag-btn.active {
    background: var(--fg);
    color: white;
    border-color: var(--fg);
  }

  .tag-btn[data-tag="분노"].active  { background: var(--분노); border-color: var(--분노); }
  .tag-btn[data-tag="호소"].active  { background: var(--호소); border-color: var(--호소); }
  .tag-btn[data-tag="유머"].active  { background: var(--유머); border-color: var(--유머); }
  .tag-btn[data-tag="명령"].active  { background: var(--명령); border-color: var(--명령); }
  .tag-btn[data-tag="경고"].active  { background: var(--경고); border-color: var(--경고); }
  .tag-btn[data-tag="위협"].active  { background: var(--위협); border-color: var(--위협); }
  .tag-btn[data-tag="친근"].active  { background: var(--친근); border-color: var(--친근); }
  .tag-btn[data-tag="냉소"].active  { background: var(--냉소); border-color: var(--냉소); }

  .count {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
  }

  .card {
    background: var(--bg);
    cursor: pointer;
    transition: background 0.1s;
  }

  .card:hover { background: white; }

  .card.hidden { display: none; }

  .card-img {
    width: 100%;
    aspect-ratio: 4/3;
    overflow: hidden;
    background: #e8e6e0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* placeholder when no image */
  .card-img .placeholder-text {
    font-size: 18px;
    font-weight: 700;
    color: #bbb;
    text-align: center;
    padding: 20px;
    line-height: 1.4;
    letter-spacing: -0.02em;
    display: none;
  }

  .card-img img.broken { display: none; }
  .card-img img.broken + .placeholder-text { display: block; }

  .card-body {
    padding: 14px 16px 16px;
  }

  .card-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 2px 7px;
    border-radius: 1px;
    margin-bottom: 8px;
    color: white;
  }

  .card-text {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.4;
    margin-bottom: 6px;
    word-break: keep-all;
  }

  .card-meta {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 10px;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg);
    max-width: 780px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .modal-img {
    aspect-ratio: 3/4;
    overflow: hidden;
    background: #e8e6e0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .modal-img .placeholder-text {
    font-size: 28px;
    font-weight: 700;
    color: #bbb;
    padding: 30px;
    text-align: center;
    line-height: 1.3;
    display: none;
  }

  .modal-img img.broken { display: none; }
  .modal-img img.broken + .placeholder-text { display: block; }

  .modal-content {
    padding: 36px 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .modal-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 3px 9px;
    border-radius: 1px;
    color: white;
    width: fit-content;
  }

  .modal-text {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.3;
    word-break: keep-all;
  }

  .modal-fields {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .modal-field label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .modal-field p {
    font-size: 13px;
    word-break: keep-all;
  }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 20px;
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: white;
    line-height: 1;
  }

  /* color map */
  .emotion-분노 { background: var(--분노); }
  .emotion-호소 { background: var(--호소); }
  .emotion-유머 { background: var(--유머); }
  .emotion-명령 { background: var(--명령); }
  .emotion-경고 { background: var(--경고); }
  .emotion-위협 { background: var(--위협); }
  .emotion-친근 { background: var(--친근); }
  .emotion-냉소 { background: var(--냉소); }

  @media (max-width: 600px) {
    header { padding: 30px 20px 24px; flex-direction: column; align-items: flex-start; }
    .controls { padding: 14px 20px; }
    .grid { grid-template-columns: repeat(2, 1fr); }
    .modal { grid-template-columns: 1fr; }
    .modal-img { aspect-ratio: 4/3; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>도시의 목소리</h1>
    <p>같은 말, 다른 감정. 도시 곳곳의 손글씨 안내문·경고문을 감정 언어로 분류한 아카이브.</p>
  </div>
  <div class="header-right">
    <span id="total-count">18</span>
    수집된 문서
  </div>
</header>

<div class="controls">
  <span class="filter-label">감정</span>
  <button class="tag-btn active" data-tag="전체">전체</button>
  <button class="tag-btn" data-tag="분노">분노</button>
  <button class="tag-btn" data-tag="호소">호소</button>
  <button class="tag-btn" data-tag="유머">유머</button>
  <button class="tag-btn" data-tag="명령">명령</button>
  <button class="tag-btn" data-tag="경고">경고</button>
  <button class="tag-btn" data-tag="위협">위협</button>
  <button class="tag-btn" data-tag="친근">친근</button>
  <button class="tag-btn" data-tag="냉소">냉소</button>
  <span class="count" id="visible-count">18개 표시 중</span>
</div>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modal-overlay">
  <button class="modal-close" id="modal-close">×</button>
  <div class="modal" id="modal-content-box"></div>
</div>

const emotionColors = {
  분노: '#c0392b', 호소: '#2980b9', 유머: '#f39c12',
  명령: '#2c3e50', 경고: '#e67e22', 위협: '#8e44ad',
  친근: '#27ae60', 냉소: '#7f8c8d'
};

let currentFilter = '전체';

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  let visible = 0;

  data.forEach((item, i) => {
    const show = currentFilter === '전체' || item.emotion === currentFilter;
    if (show) visible++;

    const card = document.createElement('div');
    card.className = 'card' + (show ? '' : ' hidden');
    card.innerHTML = `
      <div class="card-img">
        <img src="${item.file}" alt="${item.text}" onerror="this.classList.add('broken')">
        <div class="placeholder-text">${item.text}</div>
      </div>
      <div class="card-body">
        <span class="card-tag emotion-${item.emotion}" style="background:${emotionColors[item.emotion]}">${item.emotion}</span>
        <div class="card-text">${item.text}</div>
        <div class="card-meta">
          <span>${item.material.split(' ')[0]}</span>
          <span>${item.location}</span>
        </div>
      </div>
    `;
    card.addEventListener('click', () => openModal(i));
    grid.appendChild(card);
  });

  document.getElementById('visible-count').textContent = `${visible}개 표시 중`;
}

function openModal(index) {
  const item = data[index];
  const overlay = document.getElementById('modal-overlay');
  const box = document.getElementById('modal-content-box');

  box.innerHTML = `
    <div class="modal-img">
      <img src="${item.file}" alt="${item.text}" onerror="this.classList.add('broken')">
      <div class="placeholder-text">${item.text}</div>
    </div>
    <div class="modal-content">
      <span class="modal-tag" style="background:${emotionColors[item.emotion]}">${item.emotion}</span>
      <div class="modal-text">${item.text}</div>
      <div class="modal-fields">
        <div class="modal-field">
          <label>재료 및 기법</label>
          <p>${item.material}</p>
        </div>
        <div class="modal-field">
          <label>설치 환경</label>
          <p>${item.environment}</p>
        </div>
        <div class="modal-field">
          <label>작성자에 대한 추론</label>
          <p>${item.notes}</p>
        </div>
      </div>
    </div>
  `;
  overlay.classList.add('open');
}

document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget || e.target.id === 'modal-close') {
    document.getElementById('modal-overlay').classList.remove('open');
  }
});

document.querySelectorAll('.tag-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.tag;
    renderGrid();
  });
});

renderGrid();
</script>
